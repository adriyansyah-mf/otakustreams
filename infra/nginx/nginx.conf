worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # ---- Rate limiting (public-ready basics) ----
  # Per-IP rate limits for sensitive endpoints.
  limit_req_zone $binary_remote_addr zone=auth_ratelimit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=admin_ratelimit:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=community_ratelimit:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=reports_ratelimit:10m rate=20r/m;

  # ---- Security headers (baseline) ----
  # Note: HSTS is only meaningful on HTTPS; enable once TLS is in place.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "cross-origin" always;

  # Minimal CSP that still allows video iframes.
  # If you later proxy images or tighten domains, update this.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: https: http:; media-src 'self' https: http:; frame-src https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: http:;" always;

  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:8000;
  }

  map $sent_http_content_type $expires {
    default                    off;
    text/css                   7d;
    application/javascript     7d;
    application/x-javascript   7d;
    image/svg+xml              30d;
    image/png                  30d;
    image/jpeg                 30d;
    image/webp                 30d;
    image/avif                 30d;
    font/woff2                 30d;
  }

  server {
    listen 80;
    server_name otakunesia.com www.otakunesia.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    server_name otakunesia.com www.otakunesia.com;

    ssl_certificate /etc/letsencrypt/live/otakunesia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otakunesia.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # API
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_upstream/;
    }

    # Stricter limits for auth/admin endpoints
    location ^~ /api/auth/ {
      limit_req zone=auth_ratelimit burst=20 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_upstream/auth/;
    }

    location ^~ /api/admin/ {
      limit_req zone=admin_ratelimit burst=60 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_upstream/admin/;
    }

    location ^~ /api/community/ {
      limit_req zone=community_ratelimit burst=80 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_upstream/community/;
    }

    location ^~ /api/reports/ {
      limit_req zone=reports_ratelimit burst=30 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_upstream/reports/;
    }

    # Next.js
    location ^~ /_next/static/ {
      proxy_pass http://web_upstream;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|webp|avif|ico|woff2)$ {
      proxy_pass http://web_upstream;
      expires $expires;
      add_header Cache-Control "public";
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://web_upstream;
    }
  }
}

